name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          package="portx-${version}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/portx" "dist/${package}/portx"
          cp README.md LICENSE "dist/${package}/"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: portx-${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f -name '*.tar.gz' -exec cp {} release-assets/ \;

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
